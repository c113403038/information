<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>工程師與設計師協作範例</title>
    <style>
        body { font-family: sans-serif; background-color: #f6f6f6; padding: 40px; }
        .container { background: white; padding: 20px; border: 1px solid #eaeaea; width: 530px; margin: auto; }
        .header { display: flex; justify-content: flex-end; margin-bottom: 10px; }
        
        /* 嚴格遵守設計稿的按鈕樣式 */
        .btn-detail {
            height: 22px; 
            border-radius: 8px; 
            background: #ffffff; 
            border: 1px solid #2f2f2f;
            font-size: 13px; 
            cursor: pointer;
            padding: 0 15px;
        }

        .image-preview {
            width: 496px; 
            height: 240px; 
            background-color: #eee;
            border: 1px solid #ccc;
            overflow: hidden;
        }

        .image-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 確保圖片縮放比例正確 */
        }

        .info-panel { display: none; margin-top: 10px; }
        .info-row { background: #e8f3ff; padding: 5px 10px; border-bottom: 1px solid #cfddff; font-size: 13px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <button class="btn-detail" onclick="toggleDetails()">查看資訊</button>
        </div>

        <div class="image-preview">
            <img src="https://www.ncu.edu.tw/assets/thumbs/800x600/files/pages/1/6580f83733221.jpg" alt="Campus">
        </div>

        <div id="details" class="info-panel">
            <div class="info-row">修改日期：2026/04/27</div>
            <div class="info-row">類別：JPG</div>
            <div class="info-row">路徑：中央大學校園圖</div>
        </div>
    </div>

    <script>
        function toggleDetails() {
            var x = document.getElementById("details");
            if (x.style.display === "block") {
                x.style.display = "none";
            } else {
                x.style.display = "block";
            }
        }
    </script>
</body>
</html>
