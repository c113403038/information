<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design to Code Example</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', "Microsoft JhengHei", sans-serif;
            background-color: #f6f6f6;
            display: flex;
            justify-content: center;
            padding: 40px;
            color: #2f2f2f;
        }

        .container {
            background: white;
            padding: 20px;
            border: 1px solid #eaeaea;
            width: 530px;
        }

        .header {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 10px;
        }

        .btn-detail {
            height: 22px;
            border-radius: 8px;
            background-color: #ffffff;
            border: 1px solid #2f2f2f;
            font-size: 13px;
            color: #2f2f2f;
            cursor: pointer;
            padding: 0 15px;
            display: flex;
            align-items: center;
        }

        .image-preview {
            width: 496px;
            height: 240px;
            background-color: #ddd;
            margin-bottom: 15px;
            overflow: hidden;
            border: 1px solid #ccc;
        }

        .image-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 確保圖片填滿格子不變形 */
        }

        .info-panel {
            display: none;
            margin-top: 10px;
            border-top: 1px solid #eaeaea;
            padding-top: 10px;
            font-size: 13px;
        }

        .info-row {
            background-color: #e8f3ff;
            margin-bottom: 2px;
            padding: 4px 10px;
            border-bottom: 1px solid #cfddff;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <button class="btn-detail" onclick="toggleDetails()">查看資訊</button>
        </div>

        <div class="image-preview">
            <img src="https://www.ncu.edu.tw/assets/thumbs/800x600/files/pages/1/6580f83733221.jpg" alt="中央大學">
        </div>

        <div id="details" class="info-panel">
            <div class="info-row">修改日期：2026/04/27</div>
            <div class="info-row">類別：JPG</div>
            <div class="info-row">大小：466.97KB</div>
            <div class="info-row" style="word-break: break-all;">
                路徑：NCU_Campus_View.jpg
            </div>
        </div>
    </div>

    <script>
        function toggleDetails() {
            const panel = document.getElementById('details');
            const btn = document.querySelector('.btn-detail');
            
            if (panel.style.display === 'block') {
                panel.style.display = 'none';
                btn.textContent = '查看資訊';
            } else {
                panel.style.display = 'block';
                btn.textContent = '收起資訊';
            }
        }
    </script>

</body>
</html>
